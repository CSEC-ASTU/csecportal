version: "3.8"

services:
  db:
    container_name: csecportal-db
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: csec
      POSTGRES_PASSWORD: csec1234
      POSTGRES_DB: csecportal
    ports:
      - "5435:5432"
    volumes:
      - csecportal_pgdata:/var/lib/postgresql/data

  lms-backend:
    container_name: lms-backend
    image: node:20-alpine
    network_mode: "host"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
    command: sh -c "npm install && npx prisma generate && npm run build:prod && node dist/bundle.js"

volumes:
  csecportal_pgdata:
